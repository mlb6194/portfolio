<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#080C18"/>
  <!-- grid dots -->
  <defs>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#1E2740"/>
    </pattern>
    <radialGradient id="glow1" cx="20%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#00F5C8" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#080C18" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#3C50C8" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#080C18" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <!-- eyebrow -->
  <text x="100" y="220" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="22" font-weight="400" fill="#00F5C8" letter-spacing="6">AI ENGINEER · IRELAND</text>
  <!-- name -->
  <text x="100" y="330" font-family="Inter, system-ui, sans-serif" font-size="96" font-weight="700" fill="#F0F4FF" letter-spacing="-3">Michael Brett</text>
  <!-- subtext -->
  <text x="100" y="400" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="400" fill="#B0BAD0">Agentic AI systems · RAG pipelines · Data applications</text>
  <!-- accent line -->
  <rect x="100" y="460" width="120" height="2" fill="#00F5C8" opacity="0.5"/>
  <!-- url -->
  <text x="100" y="520" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="20" fill="#7A8499">mlb6194.github.io</text>
</svg>
